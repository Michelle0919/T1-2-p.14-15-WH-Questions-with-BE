<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WH-Questions Game with BE</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Animate.css CDN -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
  />

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      margin: 0;
      padding: 0;
      font-family: "Trebuchet MS", "Arial Rounded MT Bold", Arial, sans-serif;
      background: linear-gradient(135deg, #e0f7ff 0%, #fff7d6 45%, #ffe5f1 100%);
    }

    * {
      box-sizing: border-box;
      user-select: none;
    }

    .game-shell {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .soft-card {
      box-shadow: 0 12px 30px rgba(30, 64, 175, 0.16);
    }

    .answer-button {
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    }

    .answer-button:hover {
      transform: translateY(-4px) scale(1.03);
      filter: brightness(1.05);
    }

    .answer-button:active {
      transform: scale(0.96);
    }

    .scoreboard {
      height: 96px;
      min-height: 96px;
    }

    .tiny-board-text {
      font-size: clamp(16px, 1.1vw, 22px);
    }

    .choice-grid {
      grid-template-columns: repeat(5, minmax(120px, 1fr));
    }

    .pulse-ring {
      animation: pulseRing 1.25s infinite;
    }

    @keyframes pulseRing {
      0% {
        box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.45);
      }
      70% {
        box-shadow: 0 0 0 22px rgba(14, 165, 233, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(14, 165, 233, 0);
      }
    }

    .question-stage {
      width: 100%;
      height: clamp(250px, 31vh, 340px);
      border-radius: 2rem;
      background: linear-gradient(120deg, #f0fbff 0%, #fffef1 55%, #fff5fb 100%);
      border: 4px dashed #7dd3fc;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 28px;
      overflow: hidden;
    }

    .question-row {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 34px;
      white-space: nowrap;
      transform-origin: center center;
      overflow: visible;
    }

    .sentence-line {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.18em;
      white-space: nowrap;
      flex-wrap: nowrap;
      line-height: 1;
      color: #1e293b;
      font-weight: 900;
      font-size: clamp(54px, 5.2vw, 98px);
      min-width: 0;
    }

    .answer-word {
      color: #0284c7;
      text-decoration-line: underline;
      text-decoration-color: #38bdf8;
      text-decoration-thickness: 10px;
      text-underline-offset: 8px;
      font-weight: 900;
      white-space: nowrap;
    }

    .blank-underline {
      display: inline-block;
      width: 5.2ch;
      height: 0.95em;
      border-bottom: 0.12em solid #111827;
      vertical-align: baseline;
      flex: 0 0 auto;
      transform: translateY(0.06em);
      margin-right: 0.05em;
    }

    .picture-box {
      width: clamp(120px, 13vw, 210px);
      height: clamp(120px, 13vw, 210px);
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .picture-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .no-scroll-area {
      overflow: hidden;
    }

    @media (max-width: 900px) {
      .choice-grid {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }

      .scoreboard {
        height: 120px;
        min-height: 120px;
      }

      .sentence-line {
        font-size: clamp(38px, 9vw, 70px);
      }

      .question-row {
        gap: 16px;
      }

      .picture-box {
        width: 110px;
        height: 110px;
      }
    }
  </style>
</head>

          <div class="text-lg xl:text-xl font-black text-indigo-400">Level</div>
          <div id="levelText" class="text-3xl xl:text-4xl font-black text-indigo-700">1</div>
        </div>

        <div class="rounded-3xl bg-white/85 border-4 border-fuchsia-200 py-3 px-4 text-center soft-card">

          <div id="roundText" class="text-3xl xl:text-4xl font-black text-fuchsia-700">1</div>
        </div>

        <div class="rounded-3xl bg-white/85 border-4 border-emerald-200 py-3 px-4 text-center soft-card">
          <div class="text-lg xl:text-xl font-black text-emerald-400">Score</div>
          <div id="scoreText" class="text-3xl xl:text-4xl font-black text-emerald-700">0</div>
        </div>

        <div class="rounded-3xl bg-white/85 border-4 border-rose-200 py-3 px-4 text-center soft-card">
          <div class="text-lg xl:text-xl font-black text-rose-400">Time</div>
          <div id="timeText" class="text-3xl xl:text-4xl font-black text-rose-700">20</div>
        </div>
      </section>

      <section class="w-full max-w-[1680px] flex-1 min-h-0 rounded-[2rem] bg-white/90 border-4 border-sky-200 soft-card p-5 flex flex-col items-center justify-center gap-4">
        <div id="modeBadge" class="px-8 py-3 rounded-full bg-sky-100 text-sky-700 text-3xl xl:text-4xl font-black">
          Pick the question word.
        </div>

        <div id="feedback" class="h-12 text-4xl xl:text-5xl font-black text-center text-slate-700 flex items-center justify-center">
          Play!
        </div>

        <div id="questionBox" class="question-stage">
          <div id="questionRow" class="question-row animate__animated animate__fadeIn">
            <div id="questionLine" class="sentence-line">
              <span class="blank-underline" aria-hidden="true"></span>
              <span>is it?</span>
            </div>
            <div id="pictureBox" class="picture-box" aria-hidden="true"></div>
          </div>
        </div>

        <div id="hintText" class="h-9 text-2xl xl:text-3xl font-black text-violet-600 text-center">
          Things, People, Places, Time, Age
        </div>

        <div id="choices" class="w-full grid choice-grid gap-4"></div>
      </section>
    </main>

    <footer class="scoreboard px-5 pb-3">
      <div class="h-full rounded-3xl bg-slate-900 text-white border-4 border-slate-700 soft-card px-5 py-3 flex items-center justify-between gap-4">
        <div>
          <div class="text-2xl xl:text-3xl font-black text-yellow-300">Scoreboard</div>
          <div id="scoreboardText" class="tiny-board-text font-bold text-slate-200">
            Correct: 0 | Oops: 0 | Streak: 0 | Best Streak: 0

        </div>

        <div class="flex-1 max-w-[900px]">

            <div id="progressBar" class="h-full bg-gradient-to-r from-emerald-400 to-sky-400 rounded-full transition-all duration-300" style="width: 0%;"></div>
          </div>
          <div id="progressText" class="tiny-board-text text-center mt-1 font-bold text-slate-200">
            0 / 20
          </div>
        </div>

        <button id="skipBtn" class="px-6 py-3 rounded-2xl bg-violet-500 text-white text-2xl font-black shadow-lg answer-button">
          Skip
        </button>
      </div>
    </footer>
  </div>

      {

      {

        speak: "Who is your father?",
        answer: "Who",
        topic: "People",
        hint: "Father is a person.",
        imageKey: "father",
        choices: ["Who", "What", "Where", "When", "How old"]
      },
      {
        sentence: "___ is your English book?",
        speak: "Where is your English book?",
        answer: "Where",
        topic: "Places",
        hint: "Ask the place of the book.",
        imageKey: "book",
        choices: ["Where", "Who", "When", "What", "How old"]
      },
      {
        sentence: "___ is the school bus?",
        speak: "What is the school bus?",
        answer: "What",
        topic: "Things",
        hint: "A school bus is a thing.",
        imageKey: "schoolBus",
        choices: ["What", "Who", "Where", "When", "How old"]
      },
      {
        sentence: "___ is your birthday?",
        speak: "When is your birthday?",
        answer: "When",
        topic: "Time",
        hint: "Birthday is about time.",
        imageKey: "birthday",
        choices: ["When", "What", "Who", "Where", "How old"]
      },
      {
        sentence: "___ is Diana?",
        speak: "Who is Diana?",
        answer: "Who",
        topic: "People",
        hint: "Diana is a person.",
        imageKey: "person",
        choices: ["Who", "What", "Where", "When", "How old"]
      },
      {
        sentence: "___ is your little brother?",
        speak: "How old is your little brother?",
        answer: "How old",
        topic: "Age",
        hint: "Ask age with How old.",
        imageKey: "baby",
        choices: ["How old", "Where", "Who", "When", "What"]
      }
    ];

    const roundTotal = 20;
    let currentIndex = 0;
    let score = 0;
    let correct = 0;
    let wrong = 0;
    let streak = 0;
    let bestStreak = 0;
    let timeLeft = 20;
    let timer = null;
    let paused = false;
    let gameOver = false;
    let waitingForNext = false;

    const levelText = document.getElementById("levelText");
    const roundText = document.getElementById("roundText");
    const scoreText = document.getElementById("scoreText");
    const timeText = document.getElementById("timeText");
    const feedback = document.getElementById("feedback");
    const questionBox = document.getElementById("questionBox");
    const questionRow = document.getElementById("questionRow");
    const questionLine = document.getElementById("questionLine");
    const pictureBox = document.getElementById("pictureBox");
    const hintText = document.getElementById("hintText");
    const choices = document.getElementById("choices");
    const scoreboardText = document.getElementById("scoreboardText");
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");
    const modeBadge = document.getElementById("modeBadge");

    const listenBtn = document.getElementById("listenBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const restartBtn = document.getElementById("restartBtn");
    const skipBtn = document.getElementById("skipBtn");

    function shuffle(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    let gameData = shuffle(questionBank).slice(0, roundTotal);

    function getLevel() {
      if (currentIndex < 5) return 1;
      if (currentIndex < 10) return 2;
      if (currentIndex < 15) return 3;
      return 4;
    }

    function getTimeLimit() {
      const level = getLevel();
      if (level === 1) return 20;
      if (level === 2) return 18;
      if (level === 3) return 15;
      return 12;
    }

    function getModeText() {
      const level = getLevel();
      if (level === 1) return "Pick the question word.";
      if (level === 2) return "Find the best WH word.";
      if (level === 3) return "Think fast!";
      return "Final Challenge!";
    }

    function speak(text) {
      if (!("speechSynthesis" in window)) return;

      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 0.86;
      utterance.pitch = 1.08;
      utterance.volume = 1;

      window.speechSynthesis.speak(utterance);
    }

    function speakThenNext(text, delayAfterSpeech = 1000) {
      waitingForNext = true;

      if (!("speechSynthesis" in window)) {
        setTimeout(() => {
          waitingForNext = false;
          nextQuestion();
        }, delayAfterSpeech);
        return;
      }

      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 0.86;
      utterance.pitch = 1.08;
      utterance.volume = 1;

      utterance.onend = () => {
        setTimeout(() => {
          waitingForNext = false;
          nextQuestion();
        }, delayAfterSpeech);
      };

      utterance.onerror = () => {
        setTimeout(() => {
          waitingForNext = false;
          nextQuestion();
        }, delayAfterSpeech);
      };

      window.speechSynthesis.speak(utterance);
    }

    function buildQuestionHTML(sentence) {
      const parts = sentence.split("___");
      return `
        <span class="blank-underline" aria-hidden="true"></span>
        <span>${parts[1].trim()}</span>
      `;
    }

    function highlightAnswer(fullSentence, answer) {
      const escaped = answer.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const regex = new RegExp("^" + escaped);
      return fullSentence.replace(
        regex,
        `<span class="answer-word">${answer}</span>`
      );
    }

    function fitQuestionRow() {
      questionRow.style.transform = "scale(1)";
      questionRow.style.width = "100%";

      requestAnimationFrame(() => {
        const boxWidth = questionBox.clientWidth - 36;
        const boxHeight = questionBox.clientHeight - 24;

        const rowWidth = questionRow.scrollWidth;
        const rowHeight = questionRow.scrollHeight;

        const scaleX = boxWidth / rowWidth;
        const scaleY = boxHeight / rowHeight;
        const scale = Math.min(1, scaleX, scaleY);

        questionRow.style.transform = `scale(${Math.max(0.32, scale)})`;
      });
    }

    function renderQuestion() {
      if (currentIndex >= roundTotal) {
        endGame();
        return;
      }

      const item = gameData[currentIndex];
      paused = false;
      waitingForNext = false;
      pauseBtn.textContent = "Pause";
      timeLeft = getTimeLimit();

      levelText.textContent = getLevel();
      roundText.textContent = currentIndex + 1;
      scoreText.textContent = score;
      timeText.textContent = timeLeft;
      modeBadge.textContent = getModeText();
      feedback.textContent = "Play!";
      feedback.className = "h-12 text-4xl xl:text-5xl font-black text-center text-slate-700 flex items-center justify-center";
      hintText.textContent = item.hint;

      questionRow.className = "question-row animate__animated animate__fadeIn";
      questionLine.innerHTML = buildQuestionHTML(item.sentence);
      pictureBox.innerHTML = illustrations[item.imageKey] || illustrations.apple;

      renderChoices(item);
      updateScoreboard();
      fitQuestionRow();
      startTimer();
      speak(item.speak);
    }

    function renderChoices(item) {
      choices.innerHTML = "";

      const colorMap = {
        "What": "bg-yellow-400 hover:bg-yellow-300 text-yellow-950 border-yellow-500",
        "Who": "bg-emerald-400 hover:bg-emerald-300 text-emerald-950 border-emerald-500",
        "Where": "bg-sky-400 hover:bg-sky-300 text-sky-950 border-sky-500",
        "When": "bg-indigo-400 hover:bg-indigo-300 text-indigo-950 border-indigo-500",
        "How old": "bg-fuchsia-400 hover:bg-fuchsia-300 text-fuchsia-950 border-fuchsia-500"
      };

      const shuffledChoices = shuffle(item.choices);

      shuffledChoices.forEach(choice => {
        const button = document.createElement("button");
        button.className = `
          answer-button rounded-3xl border-4 px-4 py-5
          text-4xl xl:text-5xl font-black shadow-xl
          ${colorMap[choice] || "bg-slate-300 text-slate-900 border-slate-400"}
        `;
        button.textContent = choice;
        button.addEventListener("click", () => checkAnswer(choice, button));
        choices.appendChild(button);
      });
    }

    function checkAnswer(choice, button) {
      if (gameOver || paused || waitingForNext) return;

      const item = gameData[currentIndex];
      const buttons = choices.querySelectorAll("button");
      buttons.forEach(btn => (btn.disabled = true));

      clearInterval(timer);

      if (choice === item.answer) {
        score += 10 + timeLeft;
        correct++;
        streak++;
        bestStreak = Math.max(bestStreak, streak);

        feedback.textContent = "Awesome!";
        feedback.className = "h-12 text-4xl xl:text-5xl font-black text-center text-emerald-600 flex items-center justify-center animate__animated animate__tada";
        button.classList.add("animate__animated", "animate__heartBeat");

        questionLine.innerHTML = highlightAnswer(item.speak, item.answer);
        speakThenNext("Awesome! " + item.speak, 1000);
      } else {
        wrong++;
        streak = 0;

        feedback.textContent = "Oops!";
        feedback.className = "h-12 text-4xl xl:text-5xl font-black text-center text-rose-600 flex items-center justify-center animate__animated animate__shakeX";
        button.classList.add("animate__animated", "animate__shakeX");

        [...buttons].forEach(btn => {
          if (btn.textContent === item.answer) {
            btn.classList.add("ring-8", "ring-emerald-300", "animate__animated", "animate__pulse");
          }
        });

        questionLine.innerHTML = highlightAnswer(item.speak, item.answer);
        speakThenNext("Oops. The answer is " + item.answer + ". " + item.speak, 1000);
      }

      updateScoreboard();
      fitQuestionRow();
    }

    function nextQuestion() {
      currentIndex++;
      renderQuestion();
    }

    function startTimer() {
      clearInterval(timer);
      timeText.className = "text-3xl xl:text-4xl font-black text-rose-700";

      timer = setInterval(() => {
        if (paused || gameOver || waitingForNext) return;

        timeLeft--;
        timeText.textContent = timeLeft;

        if (timeLeft <= 5) {
          timeText.className = "text-3xl xl:text-4xl font-black text-rose-700 animate__animated animate__pulse";
        } else {
          timeText.className = "text-3xl xl:text-4xl font-black text-rose-700";
        }

        if (timeLeft <= 0) {
          timeOut();
        }
      }, 1000);
    }

    function timeOut() {
      if (waitingForNext) return;

      clearInterval(timer);
      const item = gameData[currentIndex];
      wrong++;
      streak = 0;

      feedback.textContent = "Time!";
      feedback.className = "h-12 text-4xl xl:text-5xl font-black text-center text-rose-600 flex items-center justify-center animate__animated animate__shakeX";

      questionLine.innerHTML = highlightAnswer(item.speak, item.answer);

      choices.querySelectorAll("button").forEach(btn => {
        btn.disabled = true;
        if (btn.textContent === item.answer) {
          btn.classList.add("ring-8", "ring-emerald-300", "animate__animated", "animate__pulse");
        }
      });

      speakThenNext("Time. The answer is " + item.answer + ". " + item.speak, 1000);
      updateScoreboard();
      fitQuestionRow();
    }

    function updateScoreboard() {
      scoreText.textContent = score;
      scoreboardText.textContent = `Correct: ${correct} | Oops: ${wrong} | Streak: ${streak} | Best Streak: ${bestStreak}`;

      const progress = Math.min(100, (currentIndex / roundTotal) * 100);
      progressBar.style.width = progress + "%";
      progressText.textContent = `${currentIndex} / ${roundTotal}`;
    }

    function endGame() {
      gameOver = true;
      waitingForNext = false;
      clearInterval(timer);

      const finalMessage =
        score >= 430 ? "Super Star!" :
        score >= 320 ? "Great Job!" :
        score >= 200 ? "Good Work!" :
        "Keep Going!";

      modeBadge.textContent = "Game Over";
      feedback.textContent = finalMessage;
      feedback.className = "h-12 text-4xl xl:text-5xl font-black text-center text-emerald-600 flex items-center justify-center animate__animated animate__bounceIn";

      questionLine.innerHTML = `
        <span class="answer-word">Score</span>
        <span>${score}</span>
      `;

      pictureBox.innerHTML = `
        <svg class="picture-svg" viewBox="0 0 220 200">
          <path d="M110 28 L129 75 L180 79 L141 112 L154 162 L110 135 L66 162 L79 112 L40 79 L91 75Z" fill="#facc15" stroke="#ca8a04" stroke-width="7"/>
          <circle cx="90" cy="92" r="6" fill="#78350f"/>
          <circle cx="130" cy="92" r="6" fill="#78350f"/>
          <path d="M88 112 Q110 132 132 112" fill="none" stroke="#78350f" stroke-width="7" stroke-linecap="round"/>
        </svg>
      `;

      hintText.textContent = `Correct: ${correct} | Oops: ${wrong} | Best Streak: ${bestStreak}`;

      choices.innerHTML = `
        <button id="playAgainBtn" class="answer-button col-span-full rounded-3xl border-4 border-emerald-500 bg-emerald-400 hover:bg-emerald-300 text-emerald-950 px-6 py-6 text-5xl font-black shadow-xl">
          Play Again
        </button>
      `;

      progressBar.style.width = "100%";
      progressText.textContent = `${roundTotal} / ${roundTotal}`;
      speak(finalMessage + " Your score is " + score + ".");

      document.getElementById("playAgainBtn").addEventListener("click", restartGame);
      fitQuestionRow();
    }

    function restartGame() {
      window.speechSynthesis?.cancel();

      currentIndex = 0;
      score = 0;
      correct = 0;
      wrong = 0;
      streak = 0;
      bestStreak = 0;
      gameOver = false;
      paused = false;
      waitingForNext = false;
      gameData = shuffle(questionBank).slice(0, roundTotal);
      renderQuestion();
    }

    function togglePause() {
      if (gameOver || waitingForNext) return;

      paused = !paused;

      if (paused) {
        pauseBtn.textContent = "Resume";
        feedback.textContent = "Break Time";
        feedback.className = "h-12 text-4xl xl:text-5xl font-black text-center text-amber-500 flex items-center justify-center animate__animated animate__pulse";
        speak("Break Time");
      } else {
        pauseBtn.textContent = "Pause";
        feedback.textContent = "Play!";
        feedback.className = "h-12 text-4xl xl:text-5xl font-black text-center text-slate-700 flex items-center justify-center animate__animated animate__fadeIn";
        speak("Resume");
      }
    }

    function skipQuestion() {
      if (gameOver || paused || waitingForNext) return;

      clearInterval(timer);
      wrong++;
      streak = 0;
      speak("Skip");
      updateScoreboard();
      nextQuestion();
    }

    listenBtn.addEventListener("click", () => {
      if (waitingForNext) return;

      if (gameOver) {
        speak("Game Over. Your score is " + score + ".");
        return;
      }

      const item = gameData[currentIndex];
      speak(item.speak);
    });

    pauseBtn.addEventListener("click", togglePause);
    restartBtn.addEventListener("click", restartGame);
    skipBtn.addEventListener("click", skipQuestion);

    window.addEventListener("resize", fitQuestionRow);

    document.addEventListener("keydown", event => {
      if (event.key === " ") {
        event.preventDefault();
        togglePause();
      }

      if (event.key.toLowerCase() === "r") {
        restartGame();
      }

      if (event.key.toLowerCase() === "l") {
        if (!waitingForNext) {
          const item = gameData[currentIndex];
          if (item) speak(item.speak);
        }
      }

      const keyMap = {
        "1": 0,
        "2": 1,
        "3": 2,
        "4": 3,
        "5": 4
      };

      if (keyMap[event.key] !== undefined) {
        const buttons = choices.querySelectorAll("button");
        const targetButton = buttons[keyMap[event.key]];
        if (targetButton) targetButton.click();
      }
    });

    renderQuestion();
  </script>
